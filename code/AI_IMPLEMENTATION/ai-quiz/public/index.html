<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Candidate Login</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f9; text-align: center; }
    .login-box {
      width: 400px; margin: 100px auto; padding: 20px;
      background: white; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input, button {
      width: 90%; padding: 10px; margin: 10px 0;
      border-radius: 5px; border: 1px solid #ccc;
    }
    button { background: #007bff; color: white; cursor: pointer; }
    button:hover { background: #0056b3; }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Candidate Login</h2>
    <form id="loginForm">
      <input type="text" id="candidateName" placeholder="Full Name" required><br>
      <input type="text" id="username" placeholder="Username" required><br>
      <input type="password" id="password" placeholder="Password" required><br>
      <button type="submit">Start the Test</button>
    </form>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const candidateName = document.getElementById("candidateName").value.trim();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      try {
        const res = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ candidateName, username, password })
        });

        const data = await res.json();
        if (data.error) throw new Error(data.error);

        // Save session
        localStorage.setItem("candidateName", data.candidateName);
        localStorage.setItem("questions", JSON.stringify(data.questions));
        localStorage.setItem("startTime", data.startTime);
        localStorage.setItem("testCompleted", "false");

        window.location.href = "quiz.html";
      } catch (err) {
        alert("❌ Login failed: " + err.message);
      }
    });
  </script>
</body>
</html>
