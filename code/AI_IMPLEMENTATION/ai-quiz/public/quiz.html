<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Python Coding Quiz</title>
  <style>
    body { font-family: Arial, sans-serif; background: #eef2f7; padding: 20px; }
    .quiz-container { max-width: 800px; margin: auto; background: #fff;
      padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    textarea { width: 100%; height: 150px; margin-top: 10px; }
    button { padding: 10px 20px; margin-top: 15px; cursor: pointer;
      background: #28a745; color: white; border: none; border-radius: 5px; }
    button:hover { background: #218838; }
    #timer { font-size: 18px; font-weight: bold; color: red; }
  </style>
</head>
<body>
  <div class="quiz-container">
    <h2>Python Coding Quiz</h2>
    <div id="timer"></div>
    <form id="quizForm">
      <div id="questions"></div>
      <button type="submit">Submit Answers</button>
    </form>
  </div>

  <script>
    const candidateName = localStorage.getItem("candidateName");
    const questions = JSON.parse(localStorage.getItem("questions"));
    const startTime = parseInt(localStorage.getItem("startTime"));

    if (!candidateName || !questions || !startTime) {
      alert("You must log in first!");
      window.location.href = "index.html";
    }

    if (localStorage.getItem("testCompleted") === "true") {
      alert("You have already completed the test!");
      window.location.href = "index.html";
    }

    // Render questions
    const container = document.getElementById("questions");
    questions.forEach((q, i) => {
      const div = document.createElement("div");
      div.innerHTML = `<p>${i+1}. ${q.question}</p><textarea id="q${i+1}" placeholder="Write your code here..."></textarea>`;
      container.appendChild(div);
    });

    // Timer (60 minutes max)
    const duration = 60 * 60 * 1000;
    const endTime = startTime + duration;

    function updateTimer() {
      const now = Date.now();
      const remaining = endTime - now;

      if (remaining <= 0) {
        alert("⏰ Time is up! Submitting automatically.");
        document.getElementById("quizForm").requestSubmit();
        return;
      }

      const minutes = Math.floor(remaining / 60000);
      const seconds = Math.floor((remaining % 60000) / 1000);
      document.getElementById("timer").textContent = `Time Left: ${minutes}m ${seconds}s`;
    }

    setInterval(updateTimer, 1000);
    updateTimer();

    // Submit answers
    document.getElementById("quizForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const answers = [
        document.getElementById("q1").value,
        document.getElementById("q2").value,
        document.getElementById("q3").value
      ];

      if (answers.some(a => !a.trim())) {
        alert("Please answer all questions before submitting.");
        return;
      }

      try {
        const res = await fetch("/submit-answers", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          //body: JSON.stringify({ candidateName, questions, answers, startTime })
          body: JSON.stringify({ candidateName, questions: questions.map(q => q.question), answers, startTime })

        });

        const data = await res.json();
        if (data.error) throw new Error(data.error);

        alert("✅ Test submitted successfully! You may now close the tab.");
        localStorage.setItem("testCompleted", "true");
        window.location.href = "index.html";
      } catch (err) {
        alert("❌ Submission failed: " + err.message);
      }
    });
  </script>
</body>
</html>
